# Bot Engine v2.1 — Example Configuration
# Copy to /etc/bot-engine/config.yaml and customize.
# All keys map directly to CONFIG entries in bot_engine.py.
# Only include keys you want to override; defaults apply for the rest.

# ── Thresholds ──
BLOCK_THRESHOLD: 70
SUSPECT_THRESHOLD: 40
BURST_MAX_REQUESTS: 15

# ── Persistence ──
# DB_PATH: /var/lib/bot-engine/bot_scores.db
# BLOCKLIST_OUTPUT: /etc/nginx/conf.d/dynamic_blocklist.conf

# ── ML / ONNX ──
# ONNX_MODEL_PATH: /var/lib/bot-engine/bot_model.onnx

# ── drDNS ──
DRDNS_CACHE_TTL: 3600

# ── Session Tracking ──
SESSION_WINDOW_SECONDS: 300

# ── Honeypot / Deception ──
HONEYPOT_PATHS:
  - /api/v2/internal/users
  - /admin/export.csv
  - /backup/db.sql
  - /.env
  - /wp-admin/setup-config.php
  - /debug/vars
  - /server-status

# ── Drip Challenge ──
DRIP_CHALLENGE_DELAY_MS: 150

# ── Agentic AI ──
MICRO_JITTER_THRESHOLD: 0.02

# ── Endpoint-tiered thresholds ──
# Lower thresholds on expensive endpoints (LLM APIs) so suspicious traffic
# gets blocked or challenged sooner. Matched by longest path prefix.
# Missing fields fall back to the global BLOCK_/SUSPECT_THRESHOLD above.
ENDPOINT_THRESHOLDS:
  "/api/chat":
    block: 25
    suspect: 15
  "/api/":
    block: 40
    suspect: 25

# ── AI training crawler policy ──
# "block" — treat GPTBot, ClaudeBot, CCBot, PerplexityBot, etc. as bad bots
#           (instant 100 score; recommended for content you do not want
#           scraped for LLM training)
# "score" — add AI_CRAWLER_SCORE to the total; lets you observe without
#           outright blocking
# "allow" — no special treatment
AI_CRAWLER_POLICY: score
AI_CRAWLER_SCORE: 50

# ── Learn mode ──
# When true, the engine scores traffic and logs what it WOULD do, but always
# returns 200 (allow). Use this for the first 1-2 weeks of deployment to
# build a real-traffic dataset for ML retraining and threshold tuning.
# Look for [LEARN_MODE] log lines to review would-be decisions.
LEARN_MODE: false

# ── Audience-aware tooling UA policy (P1 #4) ──
# For sites where tooling clients (curl, python-requests, wget) are
# legitimately used (security research hubs, docs portals that publish
# curl snippets), set a discount to apply on non-API paths. Sensitive
# endpoints listed in ENDPOINT_THRESHOLDS still get the full penalty plus
# TOOLING_UA_API_BONUS. Leave both at 0 / default to preserve default
# strictness.
TOOLING_UA_STATIC_DISCOUNT: 0
TOOLING_UA_API_BONUS: 35

# ── Canary endpoints (P1 #8) ──
# Paths referenced only as dead code in the JS bundle (see
# static/bot_canary.js). Real browsers never request them. Any hit
# scores 100 and classifies "bad" immediately.
CANARY_PATHS:
  - /api/v2/_internal/models_internal
  - /api/v2/_internal/admin/api_keys
  - /api/v2/_internal/training/export.jsonl
  - /api/v2/_internal/users/dump

# ── First-request delay gate (P1 #9) ──
# Bots going straight to /api/chat without loading the page first get
# flagged. Set to empty list to disable.
FIRST_REQUEST_GATE_SECONDS: 2.0
FIRST_REQUEST_GATE_PATHS:
  - /api/chat

# ── Prompt injection detection (P1 #5) ──
# When true, the realtime server exposes POST /_bot_score_body. The LLM
# proxy backend should call this with the user's prompt BEFORE forwarding
# to the model, and reject requests with verdict "block".
PROMPT_INJECTION_ENABLED: true

# ── State backend (C1.2) ──
# Where session / rate / challenge state lives.
#   memory : per-process in-memory (default; lost on restart, not shared)
#   redis  : shared Redis instance — required for horizontal scaling so a
#            request hitting node A sees the session history from node B
# If redis is unreachable at startup, the engine falls back to memory with
# a stderr warning. Can be overridden by BOT_STATE_BACKEND / BOT_REDIS_URL
# environment variables.
STATE_BACKEND: memory
REDIS_URL: redis://localhost:6379/0
