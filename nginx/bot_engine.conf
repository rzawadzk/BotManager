# ═══════════════════════════════════════════════════════════════════════════════
# Bot Engine v2.1 — OpenResty/Nginx Configuration
# ═══════════════════════════════════════════════════════════════════════════════
# Full integration config for real-time bot scoring with signal capture.
#
# Requirements:
#   - OpenResty (nginx + LuaJIT) OR nginx with lua-nginx-module
#   - Bot Engine scoring server on Unix socket
#   - Lua signal capture module (openresty_signals.lua)
#
# Installation:
#   1. Copy this file to /etc/nginx/conf.d/bot_engine.conf
#   2. Copy openresty_signals.lua to /etc/nginx/lua/
#   3. Adjust server_name, SSL paths, and backend upstream
#   4. nginx -t && systemctl reload nginx
#
# Author: Rafal — VPS Bot Management
# Version: 2.1 — March 2026
# ═══════════════════════════════════════════════════════════════════════════════

# ── Lua package path ──
lua_package_path "/etc/nginx/lua/?.lua;;";

# ── Shared dict for rate limiting / caching at Lua level ──
lua_shared_dict bot_cache 10m;
lua_shared_dict bot_rate  5m;

# ── Upstream: scoring engine (Unix socket) ──
upstream bot_scoring {
    server unix:/run/bot-engine/scoring.sock;
    keepalive 64;
    keepalive_timeout 60s;
    keepalive_requests 1000;
}

# ── Upstream: your backend application ──
# REPLACE THIS before deploying. The bot engine doesn't care what's
# behind it — Node, Python, PHP, a static nginx try_files block —
# but this file assumes you've written an upstream block pointing at
# it. Common patterns:
#     server 127.0.0.1:3000;                # same-host app (Node, Go)
#     server unix:/run/app/app.sock;        # same-host app via socket
#     server app.internal:8000 max_fails=3; # different host
# Set a meaningful health-check path on your app and nginx will route
# around a dead one.
upstream backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── Upstream: dashboard ──
# Keep this on loopback. The dashboard only binds to 127.0.0.1 by
# default, and the TLS server block below should reverse-proxy to it
# via this upstream, not expose dashboard.py directly.
upstream bot_dashboard {
    server 127.0.0.1:8080;
    keepalive 8;
}

# ── Dynamic blocklist (auto-generated by scoring engine) ──
# This file is atomically replaced every 5 minutes.
# If it doesn't exist yet, nginx still starts (include is non-fatal with glob).
include /etc/nginx/conf.d/dynamic_blocklist.conf;

# ══════════════════════════════════════════════════════════════════════════════
# /_bot_auth response cache (C1.1)
# ══════════════════════════════════════════════════════════════════════════════
# Cache "allow" verdicts for 60s so repeat requests from the same good IP
# skip the Python scoring engine. Verdicts for suspect/bad/challenge are
# NOT cached — those need fresh scoring each time.
#
# Keyed by (IP, URI, UA) so cached verdicts can't be reused across
# different clients. `proxy_no_cache` is evaluated after upstream responds,
# using the X-Bot-Action header to decide whether to store.
#
# Create /var/cache/nginx/bot_auth before reloading nginx:
#   sudo mkdir -p /var/cache/nginx/bot_auth
#   sudo chown www-data:www-data /var/cache/nginx/bot_auth

proxy_cache_path /var/cache/nginx/bot_auth
    keys_zone=bot_auth_cache:10m
    max_size=100m
    inactive=5m
    use_temp_path=off;

# Cache only "allow" verdicts. Any other X-Bot-Action value → skip cache.
map $upstream_http_x_bot_action $bot_auth_no_cache {
    "allow"   0;
    default   1;
}


# ═══════════════════════════════════════════════════════════════════════════════
# MAIN SERVER BLOCK
# ═══════════════════════════════════════════════════════════════════════════════

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # ── HTTP/3 (QUIC) — uncomment if your nginx supports it ──
    # listen 443 quic reuseport;
    # listen [::]:443 quic reuseport;
    # add_header Alt-Svc 'h3=":443"; ma=86400' always;

    server_name yourdomain.com;

    # ── SSL Configuration ──
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security headers ──
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── Access log with bot scoring fields ──
    log_format bot_log '$remote_addr [$time_local] "$request" $status '
                       'score=$upstream_http_x_bot_score '
                       'action=$upstream_http_x_bot_action '
                       'class=$upstream_http_x_bot_classification '
                       'ua="$http_user_agent" '
                       'ja4=$upstream_http_x_ja4_hash '
                       'rt=$request_time';

    access_log /var/log/nginx/bot_access.log bot_log;


    # ══════════════════════════════════════════════════════════════════════════
    # SIGNAL CAPTURE (Lua phase — runs before auth_request)
    # ══════════════════════════════════════════════════════════════════════════

    access_by_lua_block {
        local signals = require "openresty_signals"
        signals.capture_all(ngx)
    }


    # ══════════════════════════════════════════════════════════════════════════
    # AUTH SUBREQUEST — Scoring Engine
    # ══════════════════════════════════════════════════════════════════════════
    # Every request triggers a subrequest to the scoring engine.
    # The engine returns: 200 (allow), 403 (block), 429 (rate limit),
    # 202 (challenge). Nginx acts on the status code.

    location = /_bot_auth {
        internal;
        proxy_pass http://bot_scoring;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";

        # ── Response cache (C1.1) ──
        # Cache allow-verdicts for 60s, keyed per-client. Nginx decides
        # whether to store based on $bot_auth_no_cache (see map above),
        # which keys off the engine's X-Bot-Action response header. This
        # cuts Python CPU on warm-path traffic by ~60-80% under load.
        proxy_cache bot_auth_cache;
        proxy_cache_key "$remote_addr|$request_uri|$http_user_agent";
        proxy_cache_valid 200 60s;
        proxy_cache_valid any 0;
        proxy_cache_methods GET HEAD POST;
        proxy_cache_bypass $bot_auth_no_cache;
        proxy_no_cache $bot_auth_no_cache;
        # Cache lock so only one request per key re-scores on miss
        proxy_cache_lock on;
        proxy_cache_lock_timeout 100ms;
        proxy_cache_use_stale error timeout updating;
        add_header X-Bot-Cache $upstream_cache_status always;

        # ── Original request metadata ──
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Original-URI     $request_uri;
        proxy_set_header X-Original-Method  $request_method;
        proxy_set_header User-Agent         $http_user_agent;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header Cookie             $http_cookie;
        proxy_set_header Referer            $http_referer;

        # ── Signal headers (set by Lua capture above) ──
        # These are set by openresty_signals.lua in the access phase
        # proxy_set_header X-JA4-Hash       (set by Lua)
        # proxy_set_header X-H2-Fingerprint (set by Lua)
        # proxy_set_header X-H3-Params      (set by Lua)
        # proxy_set_header X-Header-Order   (set by Lua)
        # proxy_set_header X-Conn-Timing    (set by Lua)

        # ── API signature forwarding ──
        proxy_set_header X-API-Key          $http_x_api_key;
        proxy_set_header X-Timestamp        $http_x_timestamp;
        proxy_set_header X-Signature        $http_x_signature;

        # ── Performance: fail-open if scoring engine is unreachable ──
        # Short timeouts ensure site stays up even if engine crashes
        proxy_connect_timeout 5ms;
        proxy_read_timeout    10ms;
        proxy_send_timeout    5ms;

        # On error or timeout, return 200 (allow) — fail open
        proxy_intercept_errors on;
        error_page 502 503 504 = @fail_open;
    }

    # Fail-open handler — allow request if scoring engine is down
    location @fail_open {
        return 200;
    }


    # ══════════════════════════════════════════════════════════════════════════
    # MAIN LOCATION — Protected by auth_request
    # ══════════════════════════════════════════════════════════════════════════

    location / {
        auth_request /_bot_auth;

        # ── Capture scoring response headers ──
        auth_request_set $bot_score  $upstream_http_x_bot_score;
        auth_request_set $bot_action $upstream_http_x_bot_action;
        auth_request_set $bot_class  $upstream_http_x_bot_classification;
        auth_request_set $bot_drip   $upstream_http_x_bot_drip_delay;

        # ── Route based on scoring decision ──
        error_page 202 = @challenge;
        error_page 429 = @rate_limited;
        # 403 is handled by nginx default (returns 403 to client)

        # ── Pass scoring metadata to backend ──
        proxy_set_header X-Bot-Score          $bot_score;
        proxy_set_header X-Bot-Action         $bot_action;
        proxy_set_header X-Bot-Classification $bot_class;
        proxy_set_header X-Real-IP            $remote_addr;
        proxy_set_header X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto    $scheme;
        proxy_set_header Host                 $host;

        proxy_pass http://backend;
    }


    # ══════════════════════════════════════════════════════════════════════════
    # API LOCATION — HMAC signature verification path
    # ══════════════════════════════════════════════════════════════════════════

    location /api/ {
        auth_request /_bot_auth;

        auth_request_set $bot_score  $upstream_http_x_bot_score;
        auth_request_set $bot_action $upstream_http_x_bot_action;
        auth_request_set $bot_class  $upstream_http_x_bot_classification;

        error_page 401 = @api_unauthorized;
        error_page 429 = @api_rate_limited;

        proxy_set_header X-Bot-Score          $bot_score;
        proxy_set_header X-Bot-Action         $bot_action;
        proxy_set_header X-Bot-Classification $bot_class;
        proxy_set_header X-Real-IP            $remote_addr;
        proxy_set_header Host                 $host;

        proxy_pass http://backend;
    }

    location @api_unauthorized {
        default_type application/json;
        return 401 '{"error":"unauthorized","message":"Valid API signature required. See docs."}';
    }

    location @api_rate_limited {
        default_type application/json;
        add_header Retry-After 10 always;
        return 429 '{"error":"rate_limited","retry_after":10}';
    }


    # ══════════════════════════════════════════════════════════════════════════
    # CHALLENGE PAGES
    # ══════════════════════════════════════════════════════════════════════════

    # PoW + Biometric challenge page
    location @challenge {
        # Check if already verified via cookie
        if ($cookie_bc_pow) {
            proxy_pass http://backend;
            break;
        }
        # Serve the challenge page (generated by pow_challenge.py)
        root /var/www/bot-challenge;
        try_files /challenge.html =403;
    }

    # Challenge beacon endpoint (receives PoW solutions + telemetry)
    location = /_bot_challenge {
        proxy_pass http://bot_scoring;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header Content-Type    $content_type;
        proxy_set_header Content-Length  $content_length;
        proxy_pass_request_body on;
    }

    # Biometric captcha endpoint
    location = /_bot_captcha {
        proxy_pass http://bot_scoring;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header Content-Type    $content_type;
        proxy_pass_request_body on;
    }

    # Rate limited response
    location @rate_limited {
        default_type application/json;
        add_header Retry-After 10 always;
        return 429 '{"error":"rate_limited","retry_after":10}';
    }


    # ══════════════════════════════════════════════════════════════════════════
    # HONEYPOT PATHS (invisible to real users, irresistible to scrapers)
    # ══════════════════════════════════════════════════════════════════════════
    # These paths are injected as hidden links by the deception engine.
    # Any access = instant bot flag.

    location ~ ^/(api/v2/internal|admin/export|backup/db|\.env|debug/config) {
        # Forward to scoring engine so it records the honeypot hit
        proxy_pass http://bot_scoring;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Original-URI     $request_uri;
        proxy_set_header X-Honeypot-Hit     "true";

        # Return a convincing fake response to keep bot engaged
        default_type application/json;
        return 200 '{"status":"ok","data":[]}';
    }


    # ══════════════════════════════════════════════════════════════════════════
    # MANAGEMENT ENDPOINTS
    # ══════════════════════════════════════════════════════════════════════════

    # Health check
    location = /_bot_health {
        proxy_pass http://bot_scoring;
    }

    # Scoring engine stats (admin only)
    location = /_bot_stats {
        allow 127.0.0.1;
        allow ::1;
        # allow YOUR_ADMIN_IP;
        deny all;
        proxy_pass http://bot_scoring;
    }

    # Dashboard UI (admin only)
    location /_dashboard/ {
        allow 127.0.0.1;
        allow ::1;
        # allow YOUR_ADMIN_IP;
        deny all;
        proxy_pass http://bot_dashboard/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }


    # ══════════════════════════════════════════════════════════════════════════
    # STATIC ASSETS & DEFAULTS
    # ══════════════════════════════════════════════════════════════════════════

    # Favicon — don't score
    location = /favicon.ico {
        access_log off;
        return 204;
    }

    # robots.txt — serve with honeypot disallow hints
    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nAllow: /\n\n# Please respect our terms of service\nDisallow: /api/v2/internal/\nDisallow: /admin/export/\n";
    }
}


# ═══════════════════════════════════════════════════════════════════════════════
# HTTP → HTTPS REDIRECT
# ═══════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}
